<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Ocean Calm Gradients -->
    <linearGradient id="sqooshBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#149c90"/>
      <stop offset="100%" stop-color="#0c7266"/>
    </linearGradient>
    
    <linearGradient id="sqooshyBlob" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faf8"/>
    </linearGradient>

    <linearGradient id="apricotAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7be7d"/>
      <stop offset="100%" stop-color="#f2a65a"/>
    </linearGradient>

    <!-- Soft Ambient Drop Shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1d2e33" flood-opacity="0.12"/>
    </filter>
    
    <filter id="blobShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0c7266" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background Squircle Frame -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#sqooshBg)"/>

  <!-- Subtle Inner Ring / Glow -->
  <rect x="44" y="44" width="424" height="424" rx="100" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="4"/>

  <!-- Sqooshy Mascot Body (A cute chubby, slightly compressed squishy blob) -->
  <g filter="url(#blobShadow)">
    <!-- Main Soft Blob Shape (Squished/compressed in middle) -->
    <path d="M 256 128
             C 340 128, 400 176, 400 256
             C 400 328, 338 376, 256 376
             C 174 376, 112 328, 112 256
             C 112 176, 172 128, 256 128 Z" 
          fill="url(#sqooshyBlob)"/>
          
    <!-- Squeeze indent indicators (subtle side squeeze curves showing tactile squish) -->
    <path d="M 124 230 Q 140 256 124 282" fill="none" stroke="#129488" stroke-width="5" stroke-linecap="round" stroke-opacity="0.3"/>
    <path d="M 388 230 Q 372 256 388 282" fill="none" stroke="#129488" stroke-width="5" stroke-linecap="round" stroke-opacity="0.3"/>
  </g>

  <!-- Mascot Face Details -->
  <!-- Sleepy/Happy Eyes (Gentle curves for calm wellness feel) -->
  <path d="M 196 238 C 196 226, 218 226, 218 238" fill="none" stroke="#26343a" stroke-width="6" stroke-linecap="round"/>
  <path d="M 294 238 C 294 226, 316 226, 316 238" fill="none" stroke="#26343a" stroke-width="6" stroke-linecap="round"/>

  <!-- Sweet Smile -->
  <path d="M 244 260 Q 256 268 268 260" fill="none" stroke="#26343a" stroke-width="5" stroke-linecap="round"/>

  <!-- Apricot Blush Cheeks -->
  <ellipse cx="178" cy="254" rx="16" ry="10" fill="#f2a65a" opacity="0.6"/>
  <ellipse cx="334" cy="254" rx="16" ry="10" fill="#f2a65a" opacity="0.6"/>

  <!-- Calm Sparkle / De-stress Star (Top right accent) -->
  <g transform="translate(366, 114) scale(0.95)" fill="url(#apricotAccent)">
    <path d="M 0 -20 Q 0 0 20 0 Q 0 0 0 20 Q 0 0 -20 0 Q 0 0 0 -20 Z"/>
  </g>
  <g transform="translate(132, 138) scale(0.6)" fill="#ffffff" opacity="0.8">
    <path d="M 0 -15 Q 0 0 15 0 Q 0 0 0 15 Q 0 0 -15 0 Q 0 0 0 -15 Z"/>
  </g>
</svg>
